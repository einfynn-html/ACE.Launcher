<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE Launcher - Download</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@700&display=swap');

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #020503;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* --- BACKGROUND CONTAINER --- */
        .bg-container {
            position: absolute;
            /* Etwas größer als der Bildschirm, damit man beim Parallax-Effekt keine Ränder sieht */
            inset: -5%;
            width: 110%;
            height: 110%;
            z-index: 1;
            overflow: hidden;
            /* Weicher Übergang für die Mausbewegung */
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .sq {
            position: absolute;
            border-radius: 12px;
            mix-blend-mode: screen;
            pointer-events: none;
            animation: floatAround infinite ease-in-out;
        }

        @keyframes floatAround {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg) scale(1);
                opacity: var(--base-opacity);
            }
            50% {
                transform: translate(var(--drift-x), var(--drift-y)) rotate(var(--drift-rot)) scale(1.05);
                opacity: calc(var(--base-opacity) + 0.15);
            }
        }

        .bg-vignette {
            position: absolute;
            inset: 0;
            /* Interaktives Radial-Gradient basierend auf CSS-Variablen (Fallback auf 30% 40%) */
            background: radial-gradient(circle at var(--mouse-x, 30%) var(--mouse-y, 40%), rgba(2, 5, 3, 0.1) 0%, rgba(2, 5, 3, 0.85) 80%);
            z-index: 2;
            pointer-events: none;
            transition: background 0.15s ease-out;
        }

        /* --- HAUPTINHALT --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
            z-index: 5;
        }

        .title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(4rem, 8vw, 8rem);
            line-height: 0.95;
            font-weight: 700;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #ffffff 30%, #a0f0c8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .subtitle {
            font-size: 1.4rem;
            font-weight: 300;
            color: #a0f0c8;
            max-width: 500px;
            line-height: 1.5;
            opacity: 0.9;
            text-shadow: 0 4px 14px rgba(0,0,0,0.6);
        }

        /* --- FOOTER BEREICH --- */
        .bottom-bar {
            width: 100%;
            padding: 40px 10%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 24px;
            z-index: 10;
            background: linear-gradient(to top, #020503 60%, transparent 100%);
        }

        /* Container für die Buttons */
        .buttons-group {
            display: flex;
            gap: 12px;
            position: relative;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #00ff88 0%, #00e67a 100%);
            color: #020503;
            font-size: 1.15rem;
            font-weight: 600;
            padding: 18px 40px;
            border-radius: 14px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 30px rgba(0, 255, 136, 0.3);
        }

        .download-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(0, 255, 136, 0.5);
        }

        .versions-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(4, 14, 9, 0.6);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.25);
            font-size: 1.15rem;
            font-weight: 600;
            padding: 18px 24px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .versions-btn:hover {
            background: rgba(0, 255, 136, 0.1);
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        /* Dropdown-Menü */
        .versions-dropdown {
            position: absolute;
            bottom: calc(100% + 12px);
            left: 0;
            width: 320px;
            max-height: 320px;
            background: rgba(4, 14, 9, 0.95);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 16px;
            padding: 8px;
            overflow-y: auto;
            display: none;
            flex-direction: column;
            gap: 4px;
            z-index: 100;
            backdrop-filter: blur(20px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8);
        }

        .versions-dropdown.show {
            display: flex;
            animation: fadeInUp 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dropdown-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            color: #ffffff;
            text-decoration: none;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .dropdown-item:hover {
            background: rgba(0, 255, 136, 0.12);
            color: #00ff88;
            padding-left: 20px;
        }

        .dropdown-item.current-highlight {
            background: rgba(0, 255, 136, 0.08);
            border: 1px solid rgba(0, 255, 136, 0.2);
        }
        
        .dropdown-item.current-highlight:hover {
            background: rgba(0, 255, 136, 0.18);
        }

        .dropdown-section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #628a73;
            padding: 10px 16px 4px 16px;
            font-weight: 600;
            border-top: 1px solid rgba(0, 255, 136, 0.1);
            margin-top: 4px;
        }

        .latest-badge {
            font-size: 0.75rem;
            background: rgba(0, 255, 136, 0.15);
            color: #00ff88;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 600;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .apk-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .apk-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            color: #ffffff;
            font-weight: 700;
            letter-spacing: 0.01em;
        }

        .apk-meta {
            font-size: 0.95rem;
            color: #628a73;
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 768px) {
            .main-content { padding: 0 6%; }
            .bottom-bar {
                flex-direction: column;
                align-items: flex-start;
                padding: 30px 6% 40px 6%;
                gap: 16px;
            }
            .buttons-group { width: 100%; flex-direction: column; }
            .download-btn, .versions-btn { width: 100%; justify-content: center; }
            .versions-dropdown { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="bg-container" id="squares-container"></div>
    <div class="bg-vignette" id="vignette-layer"></div>

    <main class="main-content">
        <h1 class="title">ACE<br>LAUNCHER</h1>
        <p class="subtitle">Der moderne Android Dashboard Launcher. Minimalistisch, performant und intelligent strukturiert.</p>
    </main>

    <footer class="bottom-bar">
        <div class="buttons-group">
            <a href="#" id="main-download-btn" class="download-btn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Jetzt herunterladen
            </a>
            
            <button class="versions-btn" id="versions-toggle-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="4" y1="6" x2="20" y2="6"></line>
                    <line x1="4" y1="12" x2="20" y2="12"></line>
